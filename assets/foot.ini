font=FiraCode Nerd Font:style=SemiBold:size=10
font-bold=FiraCode Nerd Font:style=Bold:size=10
dpi-aware=no
pad=8x6 center
term=xterm-256color
selection-target=clipboard
bold-text-in-bright=no

[scrollback]
lines=10000
multiplier=3.0
indicator-position=relative
indicator-format=line

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=always

# "stormwater": deep-navy bg, teal accent as cyan/selection, ANSI hues
# kept distinguishable but cooled toward the wallpaper palette.
[colors-dark]
alpha=0.88
background=080a0e
foreground=e6ecf2
selection-foreground=080a0e
selection-background=5f8a93

regular0=1c2733
regular1=bd6b73
regular2=8aae8f
regular3=c9a86b
regular4=6d92b0
regular5=9c84a8
regular6=5f8a93
regular7=c8d3da

bright0=3a4453
bright1=d98a90
bright2=a3c4a8
bright3=dec896
bright4=8fb0cc
bright5=bb9ec5
bright6=84a7b3
bright7=eef3f7

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
# foot ≥1.20 ships unicode-input on Ctrl+Shift+u by default; disable it so
# show-urls-launch keeps the historical chord.
unicode-input=none
show-urls-launch=Control+Shift+u
show-urls-copy=Control+Shift+y
